<style>
/* Mermaid v11 dark theme overrides — base CSS.
   Mermaid's ID-scoped styles (#mermaid-XXXX) beat class selectors,
   so we also use a post-render JS patch below for text fills. */

/* State diagram transition labels (HTML inside foreignObject) */
code.language-mermaid svg foreignObject span,
code.language-mermaid svg foreignObject p,
code.language-mermaid svg foreignObject div {
  color: #e2e8f0 !important;
}

/* Actor lifelines */
code.language-mermaid svg .actor-line {
  stroke: #475569 !important;
}

/* Sequence diagram message lines and arrows */
code.language-mermaid svg .messageLine0,
code.language-mermaid svg .messageLine1 {
  stroke: #94a3b8 !important;
}
code.language-mermaid svg marker path {
  fill: #94a3b8 !important;
  stroke: #94a3b8 !important;
}

/* State diagram boxes */
code.language-mermaid svg.statediagram rect,
code.language-mermaid svg .statediagram-state rect {
  fill: #1e293b !important;
  stroke: #64748b !important;
}

/* State diagram transition lines */
code.language-mermaid svg.statediagram path.transition {
  stroke: #94a3b8 !important;
}

/* Edge labels */
code.language-mermaid svg .edgeLabel {
  color: #e2e8f0 !important;
  background-color: #1e293b !important;
}

/* Note boxes */
code.language-mermaid svg .note {
  fill: #1e293b !important;
  stroke: #f59e0b !important;
}

/* Activation boxes */
code.language-mermaid svg .activation0,
code.language-mermaid svg .activation1 {
  fill: #334155 !important;
  stroke: #64748b !important;
}
</style>

<script>
// Post-render patch: Mermaid's ID-scoped inline <style> blocks
// have higher specificity than any class selector. We wait for
// Mermaid to finish rendering, then directly set fill attributes.
document.addEventListener('DOMContentLoaded', function() {
  function patchMermaid() {
    document.querySelectorAll('code.language-mermaid svg').forEach(function(svg) {
      // Message text: light on dark page
      svg.querySelectorAll('text.messageText').forEach(function(t) {
        t.setAttribute('fill', '#e2e8f0');
      });
      // Actor box labels: black on light actor boxes
      svg.querySelectorAll('text.actor').forEach(function(t) {
        t.setAttribute('fill', '#000000');
      });
      // Actor boxes: keep light background (Mermaid default #eaeaea is fine)
      // State node labels inside foreignObject
      svg.querySelectorAll('foreignObject span, foreignObject div, foreignObject p').forEach(function(el) {
        el.style.setProperty('color', '#e2e8f0', 'important');
      });
    });
  }
  // Mermaid renders async — retry until SVGs appear
  var attempts = 0;
  var interval = setInterval(function() {
    var svgs = document.querySelectorAll('code.language-mermaid svg text');
    if (svgs.length > 0 || attempts > 20) {
      clearInterval(interval);
      patchMermaid();
      // Patch again after a short delay in case Mermaid re-renders
      setTimeout(patchMermaid, 500);
      setTimeout(patchMermaid, 2000);
    }
    attempts++;
  }, 200);
});
</script>
